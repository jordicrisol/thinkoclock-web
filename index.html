  return (

}

// ── NAV ──────────────────────────────────────────────────────────────
function Nav({ lang, setLang, t, heroStyle }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const isDark = heroStyle === 'dark' && !scrolled;

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 5vw',
    height: 72,
    background: scrolled ? 'rgba(250,248,244,0.96)' : 'transparent',
    backdropFilter: scrolled ? 'blur(12px)' : 'none',
    borderBottom: scrolled ? '1px solid #e2dfd8' : 'none',
    transition: 'all 0.3s ease'
  };

  const linkColor = isDark ? 'rgba(255,255,255,0.8)' : 'var(--ink-mid)';
  const linkStyle = { color: linkColor, textDecoration: 'none', fontSize: 14, fontWeight: 500, letterSpacing: '0.02em', transition: 'color 0.2s' };

  return (
    <nav style={navStyle}>
      <a href="#top" style={{ textDecoration: 'none' }}>
        <Logo white={isDark} />
      </a>
      <div style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
        <div style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
          {['services', 'method', 'about', 'contact'].map((k) =>
          <a key={k} href={`#${k}`} style={linkStyle}
          onMouseEnter={(e) => e.target.style.color = isDark ? 'white' : 'var(--teal)'}
          onMouseLeave={(e) => e.target.style.color = linkColor}>
              {t.nav[k]}
            </a>
          )}
        </div>
        {/* Language switcher */}
        <div style={{ display: 'flex', gap: 4, background: isDark ? 'rgba(255,255,255,0.12)' : 'rgba(19,79,92,0.07)', borderRadius: 20, padding: '3px 5px' }}>
          {['ca', 'es', 'en'].map((l) =>
          <button key={l} onClick={() => setLang(l)} style={{
            border: 'none', background: lang === l ? isDark ? 'white' : 'var(--teal)' : 'transparent',
            color: lang === l ? isDark ? 'var(--teal)' : 'white' : linkColor,
            borderRadius: 16, padding: '4px 10px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
            fontFamily: 'var(--font-body)', textTransform: 'uppercase', letterSpacing: '0.06em',
            transition: 'all 0.2s'
          }}>
              {l}
            </button>
          )}

  };
  return (
    <section id="contact" style={{ background: 'var(--teal-dark)', padding: '64px 5vw' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
        <div>
          <span style={{ color: 'rgba(255,255,255,0.5)', fontSize: 12, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', fontFamily: 'var(--font-body)', display: 'block', marginBottom: 16 }}>{t.contact.label}</span>
          <h2 style={{ fontFamily: 'var(--font-heading)', fontWeight: 800, fontSize: 'clamp(40px,5vw,80px)', color: 'white', letterSpacing: '-0.03em', lineHeight: 1.0, marginBottom: 24 }}>{t.contact.title}</h2>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'rgba(255,255,255,0.6)', fontWeight: 300, marginBottom: 48, maxWidth: 400 }}>{t.contact.sub}</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            {t.contact.info.map((info, i) =>
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: 'rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <span style={{ color: 'var(--amber)', fontSize: 14 }}>
                    {i === 0 ? '📍' : i === 1 ? '✉' : '🌐'}
                  </span>
                </div>
                <span style={{ color: 'rgba(255,255,255,0.65)', fontSize: 14 }}>{info}</span>
              </div>
            )}
          </div>
        </div>
        <div style={{ background: 'white', borderRadius: 20, padding: '40px 44px' }}>
          {!sent ?
          <form onSubmit={(e) => {e.preventDefault();setSent(true);}}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <input placeholder={t.contact.name} required style={fieldStyle}
              onFocus={(e) => e.target.style.borderColor = 'var(--teal)'}
              onBlur={(e) => e.target.style.borderColor = 'var(--border)'} />
                <input type="email" placeholder={t.contact.email} required style={fieldStyle}
              onFocus={(e) => e.target.style.borderColor = 'var(--teal)'}
              onBlur={(e) => e.target.style.borderColor = 'var(--border)'} />
                <textarea rows={5} placeholder={t.contact.msg} required style={{ ...fieldStyle, resize: 'vertical' }}
              onFocus={(e) => e.target.style.borderColor = 'var(--teal)'}
              onBlur={(e) => e.target.style.borderColor = 'var(--border)'} />
                <button type="submit" style={{
                background: 'var(--teal)', color: 'white', border: 'none', padding: '16px',
                borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: 'pointer',
                fontFamily: 'var(--font-heading)', transition: 'all 0.2s'
              }}
              onMouseEnter={(e) => {e.target.style.background = 'var(--teal-dark)';e.target.style.transform = 'translateY(-1px)';}}
              onMouseLeave={(e) => {e.target.style.background = 'var(--teal)';e.target.style.transform = 'translateY(0)';}}>
                  {t.contact.send}
                </button>
              </div>
            </form> :

          <div style={{ textAlign: 'center', padding: '40px 0' }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>✓</div>
              <h3 style={{ fontFamily: 'var(--font-heading)', fontSize: 22, color: 'var(--teal)', marginBottom: 12 }}>Missatge enviat!</h3>
              <p style={{ color: 'var(--ink-mid)', fontSize: 15 }}>Ens posarem en contacte aviat.</p>
            </div>
          }
        </div>
      </div>
    </section>);

}

// ── FOOTER ──────────────────────────────────────────────────────────
function Footer({ t }) {
  return (
    <footer style={{ background: '#0a2930', padding: '40px 5vw', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
        <Logo white />
        <span style={{ color: 'rgba(255,255,255,0.35)', fontSize: 13 }}>{t.footer.rights}</span>
      </div>
    </footer>);

}

// ── APP ──────────────────────────────────────────────────────────────
function App() {
  const savedLang = localStorage.getItem('toc_lang') || 'ca';
  const savedTweaks = (() => {try {return JSON.parse(localStorage.getItem('toc_tweaks')) || TWEAK_DEFAULTS;} catch (e) {return TWEAK_DEFAULTS;}})();

  const [lang, setLang] = useState(savedLang);
  const [tweaks, setTweaks] = useState(savedTweaks);
  const t = COPY[lang];

  useEffect(() => {localStorage.setItem('toc_lang', lang);}, [lang]);

  // Expose tweaks setters to plain JS
  useEffect(() => {
    window.__setTweak = (key, val) => {
      setTweaks((prev) => {
        const next = { ...prev, [key]: val };
        localStorage.setItem('toc_tweaks', JSON.stringify(next));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
        return next;
      });
    };
    // sync current values to controls
    const hs = document.getElementById('tw-hero');
    const ds = document.getElementById('tw-density');
    if (hs) hs.value = tweaks.heroStyle;
    if (ds) ds.value = tweaks.density;
    document.querySelectorAll('.tweak-swatch').forEach((s) => {
      s.classList.toggle('active', s.style.background === tweaks.accentColor || s.style.background.replace(/\s/g, '') === tweaks.accentColor.replace(/\s/g, ''));
    });
    // apply density
    document.documentElement.style.setProperty('--section-pad', tweaks.density === 'compact' ? '64px' : '100px');
  }, [tweaks]);

  // Listen for host messages
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('visible');
      } else if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('visible');
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Update CSS accent
  useEffect(() => {
    document.documentElement.style.setProperty('--amber', tweaks.accentColor);
  }, [tweaks.accentColor]);

  return (
    <div>
      <Nav lang={lang} setLang={setLang} t={t} heroStyle={tweaks.heroStyle} />
      <Hero t={t} heroStyle={tweaks.heroStyle} />
      <Context t={t} />
      <Services t={t} />
      <Method t={t} />
      <About t={t} />
      <Contact t={t} />
      <Footer t={t} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
function applyTweaks() {
  const heroVal = document.getElementById('tw-hero').value;
  const densityVal = document.getElementById('tw-density').value;
  if (window.__setTweak) {
    window.__setTweak('heroStyle', heroVal);
    window.__setTweak('density', densityVal);
  }
}
function setAccent(el, color) {
  document.querySelectorAll('.tweak-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  if (window.__setTweak) window.__setTweak('accentColor', color);
}
</script>
</body>
</html>
